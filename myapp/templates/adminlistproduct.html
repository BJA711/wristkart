<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Products | WristKart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    background:#f4f6f9;
}
.sidebar{
    width:240px;
    background:#111;
    color:white;
    height:100vh;
    padding:30px 20px;
}
.sidebar h2{margin-bottom:30px;}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin-bottom:15px;
    padding:8px 10px;
    border-radius:6px;
}
.sidebar a:hover{background:#c9a227;}

.main{
    flex:1;
    padding:40px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border:1px solid #ddd;
    text-align:left;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
<a href="/sap/">Dashboard</a>
<a href="/adp/">Add Product</a>
<a href="/ap/">Manage Products</a>
<a href="/inv/">New Orders</a>
<a href="/adms/">Sales History</a>
<a href="/logout/">Logout</a>
</div>

<div class="main">

<h2>Manage Products</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Brand</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>

{% for p in crec %}
<tr>
<td>{{ p.id }}</td>
<td>{{ p.tpname }}</td>
<td>{{ p.brand }}</td>
<td>{{ p.tprice }}</td>
<td>{{ p.tstock }}</td>
<td>
<a href="/ed/{{ p.id }}/">Edit</a> |
<a href="/del/{{ p.id }}/">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
