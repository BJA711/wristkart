<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Results | WristKart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:95%;
    max-width:1300px;
    margin:50px auto;
}

h2{
    margin-bottom:30px;
}

.product-row{
    background:white;
    display:flex;
    align-items:center;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 15px rgba(0,0,0,0.05);
}

.product-image{
    width:180px;
    height:180px;
    flex-shrink:0;
}

.product-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
}

.product-details{
    flex:1;
    padding:0 30px;
}

.price{
    font-size:18px;
    font-weight:bold;
    color:#c9a227;
}

.product-action{
    width:200px;
    text-align:right;
}

.btn{
    padding:10px 18px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
.btn:hover{
    background:#c9a227;
}

.empty{
    background:white;
    padding:80px;
    text-align:center;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="container">

<h2>Search Results for "{{ query }}"</h2>

{% if products %}

{% for p in products %}
<div class="product-row">

    <div class="product-image">
        <a href="/product/{{ p.id }}/">
            <img src="{{ p.tfile.url }}">
        </a>
    </div>

    <div class="product-details">
        <a href="/product/{{ p.id }}/" style="text-decoration:none;color:black;">
            <h3>{{ p.tpname }}</h3>
        </a>

        <div style="color:#666;margin-bottom:8px;">{{ p.brand }}</div>

        <div class="price">$ {{ p.tprice }}</div>
    </div>

    <div class="product-action">
        <a href="/atoc/{{ p.id }}/" class="btn">Add to Cart</a>
    </div>

</div>
{% endfor %}

{% else %}

<div class="empty">
No products found for "<strong>{{ query }}</strong>"
<br><br>
<a href="/" class="btn">Back to Home</a>
</div>

{% endif %}

</div>

</body>
</html>
