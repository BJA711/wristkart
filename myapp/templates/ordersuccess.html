<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Successful | WristKart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:60px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
    transform:scale(0.8);
    opacity:0;
    animation:pop 0.5s forwards;
}

@keyframes pop{
    to{
        transform:scale(1);
        opacity:1;
    }
}

h1{
    color:#28a745;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="box">
<h1>✔ Order Placed Successfully!</h1>


<a href="/myp/" class="btn">View My Orders</a>
<br><br>
<a href="/invoice/{{ salesno }}/" class="btn">Download Invoice</a>

</div>

</body>
</html>
