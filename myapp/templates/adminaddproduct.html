<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Product | WristKart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    background:#f4f6f9;
}
.sidebar{
    width:240px;
    background:#111;
    color:white;
    height:100vh;
    padding:30px 20px;
}
.sidebar h2{margin-bottom:30px;}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin-bottom:15px;
    padding:8px 10px;
    border-radius:6px;
}
.sidebar a:hover{background:#c9a227;}

.main{
    flex:1;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    max-width:600px;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

button{
    padding:10px 20px;
    background:#111;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{background:#c9a227;}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
<a href="/sap/">Dashboard</a>
<a href="/adp/">Add Product</a>
<a href="/ap/">Manage Products</a>
<a href="/inv/">New Orders</a>
<a href="/adms/">Sales History</a>
<a href="/logout/">Logout</a>
</div>

<div class="main">
<div class="card">

<h2>Add Product</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="text" name="pcode" placeholder="Product Code" required>
<input type="text" name="pname" placeholder="Product Name" required>
<input type="text" name="brand" placeholder="Brand" required>

<select name="category" required>
<option value="smart">Smart</option>
<option value="luxury">Luxury</option>
<option value="sport">Sport</option>
<option value="casual">Casual</option>
</select>

<input type="text" name="gender" placeholder="Gender" required>
<input type="text" name="strap" placeholder="Strap Material" required>
<input type="file" name="file" required>

<input type="number" name="price" placeholder="Price" required>
<input type="number" name="stock" placeholder="Stock" required>

<button type="submit">Add Product</button>

</form>

</div>
</div>

</body>
</html>
