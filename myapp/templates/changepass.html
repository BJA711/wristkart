<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Change Password | WristKart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    background:#f5f5f5;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111;
    color:white;
    height:100vh;
    padding:30px 20px;
}

.sidebar h1{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:black;
    text-decoration:none;
    margin-bottom:15px;
    padding:8px 10px;
    border-radius:6px;
}

.sidebar a:hover{
    background:#9abddc;
}

.active{
    background:blue;
}
.backbtn{
    padding:6px 12px;
    background:yellow;
    color:black;
    text-decoration:none;
    border-radius:50px;
    font-size:16px;
}
.home a
{
  all: unset;
  cursor: pointer;
}

/* MAIN */
.main{
    flex:1;
    align-items:center;
    justify-content:center;
    padding:100px;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    max-width:500px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.card h3{
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:95%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
}

.btn{
    width:100%;
    padding:12px;
    background:blue;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover{
    background:#9abddc;
}

.error{
    background:#ff4d4d;
    color:white;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
}

.success{
    background:#28a745;
    color:white;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="sidebar">
<div class="home">
<a href="/"><button class="backbtn">Home</button></a>
</div><br><br>
<h1>My Account</h1>
<a href="/profile/">Profile</a>
<a href="/myp/">My Orders</a>
<a href="/passs/" class="active">Change Password</a>
<a href="/logout/">Logout</a>
</div>

<div class="main">

<div class="card">

<h3>Change Password</h3>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if success %}
<div class="success">{{ success }}</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-group">
<input type="password" name="old" placeholder="Old Password" required>
</div>

<div class="input-group">
<input type="password" name="n1" placeholder="New Password" required>
</div>

<div class="input-group">
<input type="password" name="n2" placeholder="Confirm New Password" required>
</div>

<button type="submit" class="btn">Update Password</button>

</form>

</div>

</div>

</body>
</html>
