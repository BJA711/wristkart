<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{% block title %}Admin Panel{% endblock %}</title>

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#111;
    color:white;
    height:100vh;
    padding:30px 20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin-bottom:15px;
    padding:8px 10px;
    border-radius:6px;
}

.sidebar a:hover{
    background:#c9a227;
}

.main{
    flex:1;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
</style>

</head>
<body>

<div class="sidebar">
<h2>Admin Panel</h2>

<a href="/sap/">Dashboard</a>
<a href="/adp/">Add Product</a>
<a href="/ap/">Manage Products</a>
<a href="/inv/">New Orders</a>
<a href="/adms/">Sales History</a>
<a href="/logout/">Logout</a>

</div>

<div class="main">
{% block content %}{% endblock %}
</div>

</body>
</html>
